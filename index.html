<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMINO - Fashion & Lifestyle</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="hero.css">
</head>
<body>
    <!-- HEADER / NAVIGATION -->
    <header>
        <nav>
            <div class="logo">
                <img src="asset/Logo.png" alt="UMINO Logo">
            </div>
            <ul class="nav-menu">
                <li><a href="#home">Home <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></a></li>
                <li><a href="#shop">Shop <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></a></li>
                <li><a href="#products">Products <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></a></li>
                <li><a href="#pages">Pages <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></a></li>
                <li><a href="#blog">Blog <svg class="chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></a></li>
                <li><a href="#sale">Sale</a></li>
                <li><a href="#buy-umino">Buy Umino!</a></li>
            </ul>
            <div class="header-icons">
                <button class="icon-btn" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                </button>
                <button class="icon-btn" aria-label="Login">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <button class="icon-btn" aria-label="Recently Viewed">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                </button>
                <button class="icon-btn" aria-label="Wishlist">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <span class="badge">2</span>
                </button>
                <button class="icon-btn" aria-label="Cart">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                    <span class="badge">2</span>
                </button>
            </div>
        </nav>
    </header>

    <!-- HERO BANNERS SECTION -->
    <section class="hero-banners">
        <div class="banner banner-left">
            <img src="asset/hero-left.png" alt="Sleeveless Dress">
            <div class="banner-content">
                <span class="banner-label">LIMITED OFFER</span>
                <h1 class="banner-title">Sleeveless Dress</h1>
                <button class="btn btn-primary">Shop Sale</button>
            </div>
        </div>

        <div class="banner banner-right">
            <img src="asset/hero-right.png" alt="Boys Comfy Styles">
            <div class="banner-content">
                <span class="banner-label">NEW COLLECTION</span>
                <h1 class="banner-title">Boys Comfy Styles</h1>
                <button class="btn btn-primary">Shop Sale</button>
            </div>
        </div>
    </section>
</body>
</html>
